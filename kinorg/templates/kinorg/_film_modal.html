{% load static %}
{% if user.is_authenticated %}
<div id="film_modal" class="film_modal_overlay" data-placeholder="{% static 'images/placeholder.jpg' %}">
    <div class="film_modal_card">
        <button class="film_modal_close" id="film_modal_close">&times;</button>
        <div class="film_modal_top">
            <img id="film_modal_poster" class="film_modal_poster" src="" alt="">
            <div class="film_modal_info">
                <a id="film_modal_detail_link" href="#" class="film_modal_detail_link">
                    <h4 id="film_modal_title"></h4>
                    <p id="film_modal_meta" class="film_modal_meta"></p>
                </a>
            </div>
        </div>
        <div class="film_modal_lists_wrap" id="film_modal_lists_wrap">
            <div id="film_modal_lists" class="film_modal_lists"></div>
        </div>
        <div class="film_modal_create_wrap">
            <button class="btn btn-cta film_modal_new_list" id="film_modal_new_list_btn">+ Create new list</button>
            <div class="film_modal_create_form" id="film_modal_create_form" style="display:none">
                <input type="text" id="film_modal_list_title" placeholder="List name…" maxlength="80" autocomplete="off">
                <button class="btn btn-cta" id="film_modal_create_submit">Create</button>
                <button class="film_modal_create_cancel" id="film_modal_create_cancel" aria-label="Cancel">&times;</button>
            </div>
            <p class="film_modal_create_error" id="film_modal_create_error"></p>
        </div>
    </div>
</div>
{% endif %}
